<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Piko Futsal 2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Internal styles to ensure the "Apple" look for the form */
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            margin-bottom: 30px;
        }

        .registration-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d4ff;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .payment-note {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #ccc;
        }

        .payment-note strong {
            color: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #00d4ff;
            transform: scale(1.02);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Join the League.</h1>
        <p>Register your squad for Piko Futsal Aug 2026.</p>

        <div class="registration-card">
            <form action="/api/register" method="POST">
                
                <div class="input-group">
                    <label>Team Name</label>
                    <input type="text" name="team_name" placeholder="e.g. Westlands United" required>
                </div>

                <div class="input-group">
                    <label>Captain Name</label>
                    <input type="text" name="captain_name" placeholder="Full Name" required>
                </div>

                <div class="payment-note">
                    <strong>Lipa na M-PESA</strong><br>
                    Buy Goods Till: <strong>[Enter Your Till Here]</strong><br>
                    Amount: <strong>KSH 2,500</strong>
                </div>

                <div class="input-group">
                    <label>M-PESA Transaction Code</label>
                    <input type="text" name="mpesa_code" placeholder="e.g. RBT5X9JK2" required>
                </div>

                <button type="submit" class="btn-submit">Confirm Registration</button>
            </form>
        </div>

        <a href="index.html" class="back-link">← Cancel and go back</a>
    </div>

</body>
</html>
