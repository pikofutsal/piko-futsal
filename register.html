<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Tournament Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="registration-container">
        <h2>🎟️ Get Your Tournament Ticket</h2>
        <p>Fill in your details, then proceed to M-Pesa payment.</p>

        <form id="ticketForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="e.g. Jamal Musiala" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="input-group">
                <label for="phone">M-Pesa Phone Number</label>
                <input type="tel" id="phone" placeholder="0712345678" required>
            </div>

            <button type="submit" id="payBtn">Proceed to Payment (KSh 500)</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
